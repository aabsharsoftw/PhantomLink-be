version: "3.9"
services:
  api:
    build: .
    ports: ["5000:8080"]
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=phantompulse;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - Auth__Secret=your-256-bit-secret-change-in-production
      - Auth__Issuer=phantompulse
      - Auth__Audience=phantompulse-api
      - WhatsApp__PhoneNumberId=YOUR_PHONE_NUMBER_ID
      - WhatsApp__AccessToken=YOUR_ACCESS_TOKEN
      - WhatsApp__WebhookVerifyToken=YOUR_VERIFY_TOKEN
    depends_on: [postgres, redis]
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: phantompulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  pgdata:
